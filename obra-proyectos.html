<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyectos - Carolina Hernández Esguep</title>

<style>

body{
  font-family: Arial, sans-serif;
  margin:0;
  background:white;
}

header{
  padding:40px;
  text-align:center;
}

nav a{
  margin:15px;
  text-decoration:none;
  color:black;
  font-size:18px;
}

section{
  padding:60px;
  max-width:900px;
  margin:auto;
}

/* 🔥 DOS COLUMNAS */
.proyectos{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:40px;
  margin-bottom:40px;
}

.item{
  cursor:pointer;
}

/* 🔥 IMAGEN */
.item img{
  width:100%;
  height:300px;
  object-fit:cover;
}

/* 🔥 TITULO */
.subtitulo{
  font-size:18px;
  margin-top:10px;
}

/* 🔥 TEXTO */
.descripcion{
  font-size:14px;
  color:#444;
  margin-top:5px;
  line-height:1.4;
}

/* VISOR */
.viewer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.viewer img{
  max-width:80%;
  max-height:80%;
  transition:0.3s;
}

/* BOTONES */
.boton{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:40px;
  color:white;
  cursor:pointer;
  padding:20px;
}

.prev{ left:20px; }
.next{ right:20px; }

.cerrar{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  color:white;
  cursor:pointer;
}

footer{
  text-align:center;
  font-size:12px;
  color:gray;
  padding:20px 0;
  border-top:1px solid #eee;
}

</style>

</head>

<body>

<header>

<h1>Carolina Hernández Esguep</h1>

<nav>
<a href="index.html">Inicio</a>
<a href="obras.html">Obras</a>
<a href="pedagogia.html">Pedagogía</a>
<a href="trayectoria.html">Trayectoria</a>
<a href="contacto.html">Contacto</a>
</nav>

</header>

<section>

<h2>Proyectos</h2>

<div class="proyectos">

  <!-- TERRENO -->
  <div class="item" onclick="abrirGaleria(0)">
    <img src="terreno3.jpg">
    <p class="subtitulo">Terreno baldío (2003)</p>
    <p class="descripcion">
      Referente urbano para obra, demolición de edificio.<br>
      Balmaceda con San Antonio, Santiago
    </p>
  </div>

  <!-- SOLO 3 -->
  <div class="item" onclick="abrirGaleria(1)">
    <img src="planificacion1.jpg">
    <p class="subtitulo">"Solo 3" (2007)</p>
    <p class="descripcion">
      Proyecto Parque Andrés Jarlan
    </p>
  </div>

</div>

</section>

<!-- VISOR -->
<div class="viewer" id="viewer">
  <span class="cerrar" onclick="cerrarGaleria()">✕</span>
  <span class="boton prev" onclick="cambiar(-1)">←</span>
  <img id="imagenActiva">
  <span class="boton next" onclick="cambiar(1)">→</span>
</div>

<footer>
Carolina Hernández Esguep - Artista Visual
</footer>

<script>

document.addEventListener("DOMContentLoaded", () => {

const galerias = [
  [
    "terreno3.jpg",
    "terreno2.jpg",
    "terreno1.jpg"
  ], 
  [
    "planificacion1.jpg",
    "planificacion2.jpg",
    "planificacion3.png",
    "planificacion4.jpg",
    "planificacion5.jpg"
  ]
];

let galeriaActual = 0;
let indexActual = 0;

const viewer = document.getElementById("viewer");
const img = document.getElementById("imagenActiva");

const contador = document.createElement("div");
contador.style.position = "absolute";
contador.style.bottom = "30px";
contador.style.color = "white";
contador.style.fontSize = "18px";
viewer.appendChild(contador);

function mostrar(){
  img.style.opacity = 0;

  setTimeout(() => {
    img.src = galerias[galeriaActual][indexActual];
    contador.innerText = (indexActual + 1) + " / " + galerias[galeriaActual].length;
    img.style.opacity = 1;
  }, 150);
}

window.abrirGaleria = function(id){
  galeriaActual = id;
  indexActual = 0;
  viewer.style.display = "flex";
  mostrar();
}

window.cambiar = function(dir){
  const total = galerias[galeriaActual].length;
  indexActual = (indexActual + dir + total) % total;
  mostrar();
}

window.cerrarGaleria = function(){
  viewer.style.display = "none";
}

document.addEventListener("keydown", (e) => {
  if(viewer.style.display === "flex"){
    if(e.key === "ArrowRight") cambiar(1);
    if(e.key === "ArrowLeft") cambiar(-1);
    if(e.key === "Escape") cerrarGaleria();
  }
});

/* SWIPE */
let startX = 0;

viewer.addEventListener("touchstart", (e) => {
  startX = e.touches[0].clientX;
});

viewer.addEventListener("touchend", (e) => {
  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 50) cambiar(1);
  if(endX - startX > 50) cambiar(-1);
});

});

</script>

</body>
</html>
