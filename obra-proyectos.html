<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyectos - Carolina Hernández Esguep</title>

<style>

body{
  font-family: Arial, sans-serif;
  margin:0;
  background:white;
}

header{
  padding:40px;
  text-align:center;
}

nav a{
  margin:15px;
  text-decoration:none;
  color:black;
  font-size:18px;
}

section{
  padding:60px;
  max-width:900px;
  margin:auto;
}

/* 🔥 DOS COLUMNAS */
.proyectos{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:40px;
  margin-bottom:40px;
}

.item{
  cursor:pointer;
}

.item img{
  width:100%;
  height:300px;
  object-fit:cover;
}

.subtitulo{
  font-size:18px;
  margin-top:10px;
}

/* VISOR */
.viewer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.viewer img{
  max-width:80%;
  max-height:80%;
}

/* BOTONES */
.boton{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:40px;
  color:white;
  cursor:pointer;
  padding:20px;
}

.prev{ left:20px; }
.next{ right:20px; }

.cerrar{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  color:white;
  cursor:pointer;
}

footer{
  text-align:center;
  font-size:12px;
  color:gray;
  padding:20px 0;
  border-top:1px solid #eee;
}

</style>

</head>

<body>

<header>

<h1>Carolina Hernández Esguep</h1>

<nav>
<a href="index.html">Inicio</a>
<a href="obras.html">Obras</a>
<a href="pedagogia.html">Pedagogía</a>
<a href="trayectoria.html">Trayectoria</a>
<a href="contacto.html">Contacto</a>
</nav>

</header>

<section>

<h2>Proyectos</h2>

<!-- 🔥 AHORA ESTÁN LADO A LADO -->
<div class="proyectos">

  <!-- TERRENO -->
  <div class="item" onclick="abrirGaleria(0)">
    <img src="terreno3.jpg">
    <p class="subtitulo">Terreno baldío (2003)</p>
  </div>

  <!-- SOLO 3 -->
  <div class="item" onclick="abrirGaleria(1)">
    <img src="planificacion1.jpg">
    <p class="subtitulo">"Solo 3" (2007)</p>
  </div>

</div>

</section>

<!-- VISOR -->
<div class="viewer" id="viewer">
  <span class="cerrar" onclick="cerrarGaleria()">✕</span>
  <span class="boton prev" onclick="cambiar(-1)">←</span>
  <img id="imagenActiva">
  <span class="boton next" onclick="cambiar(1)">→</span>
</div>

<footer>
Carolina Hernández Esguep - Artista Visual
</footer>

<script>

/* 🔥 GALERÍAS SEPARADAS */
const galerias = [
  [
    "terreno3.jpg",
  "terreno2.jpg,
  "terreno1.jpg"
  ], 
  [
    "planificacion1.jpg",
   "planificacion2.jpg",
  "planificacion3.png",
  "planificacion4.jpg",
  "planificacion5.png"
  ]
];

let galeriaActual = 0;
let indexActual = 0;

function abrirGaleria(id){
  galeriaActual = id;
  indexActual = 0;
  document.getElementById("viewer").style.display = "flex";
  mostrar();
}

function mostrar(){
  document.getElementById("imagenActiva").src = galerias[galeriaActual][indexActual];
}

function cambiar(dir){
  const total = galerias[galeriaActual].length;
  indexActual = (indexActual + dir + total) % total;
  mostrar();
}

function cerrarGaleria(){
  document.getElementById("viewer").style.display = "none";
}

/* TECLADO */
document.addEventListener("keydown", (e) => {
  if(document.getElementById("viewer").style.display === "flex"){
    if(e.key === "ArrowRight") cambiar(1);
    if(e.key === "ArrowLeft") cambiar(-1);
  }
});

</script>

</body>
</html>
